name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate pack
        run: python3 -m unittest discover -s tests -v

      - name: Read version
        id: ver
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('pack-manifest.json'))['pack_version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.ver.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build profile ZIPs
        if: steps.check.outputs.exists == 'false'
        run: python3 scripts/build-release-bundles.py

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --title "Documentation Bundle ${{ steps.ver.outputs.version }}" \
            --generate-notes \
            dist/*.zip
