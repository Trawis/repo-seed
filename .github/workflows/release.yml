name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: ver
        run: |
          VERSION=$(tr -d '[:space:]' < .agent-guidelines-version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.ver.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build profile ZIPs
        if: steps.check.outputs.exists == 'false'
        run: |
          python3 - <<'EOF'
          import importlib.util
          import sys
          import zipfile
          from pathlib import Path

          spec = importlib.util.spec_from_file_location("sync", "scripts/sync-agent-guidelines.py")
          mod = importlib.util.module_from_spec(spec)
          sys.modules[spec.name] = mod
          spec.loader.exec_module(mod)

          VERSION = Path(".agent-guidelines-version").read_text().strip()
          Path("dist").mkdir(exist_ok=True)
          for profile, files in mod.PROFILES.items():
              zip_path = f"dist/agent-guidelines-pack_{profile}_{VERSION}.zip"
              with zipfile.ZipFile(zip_path, "w", zipfile.ZIP_DEFLATED) as zf:
                  for f in files:
                      p = Path(f)
                      if p.exists():
                          zf.write(p, f)
              print(f"created {zip_path}")
          EOF

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --title "Documentation Bundle ${{ steps.ver.outputs.version }}" \
            --generate-notes \
            dist/*.zip
