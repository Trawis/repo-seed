name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate pack
        run: python -m unittest discover -s tests -v

      - name: Read version
        id: ver
        run: |
          VERSION=$(python -c "import json; print(json.load(open('pack/manifest.json'))['pack_version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.ver.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build universal ZIP
        if: steps.check.outputs.exists == 'false'
        run: |
          python scripts/build-release-bundle.py
          cd dist
          sha256sum *.zip > "repo-seed-pack-${{ steps.ver.outputs.version }}.zip.sha256"

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --title "Repo Seed Pack ${{ steps.ver.outputs.version }}" \
            --generate-notes \
            dist/*
